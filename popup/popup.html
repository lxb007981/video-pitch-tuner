<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Pitch Tuner</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <p class="eyebrow">EDGE EXTENSION</p>
        <h1>Video Pitch Tuner</h1>
        <p class="subtitle">Tune the current tab’s playing video in semitones.</p>
      </header>

      <section class="panel">
        <div class="status-row">
          <span class="status-label">Status</span>
          <span id="status-pill" class="status-pill">Checking</span>
        </div>

        <section class="control-group" aria-label="Pitch controls">
          <div class="control-copy">
            <span>Pitch</span>
            <output id="pitch-value">0 st</output>
          </div>

          <div class="pitch-stepper">
            <button id="decrease-button" type="button" aria-label="Decrease pitch by one semitone">-</button>
            <div class="pitch-display">
              <span class="pitch-display-value" id="pitch-display-value">0</span>
              <span class="pitch-display-unit">semitones</span>
            </div>
            <button id="increase-button" type="button" aria-label="Increase pitch by one semitone">+</button>
          </div>

          <div class="range-labels">
            <span>-12</span>
            <span>1 st steps</span>
            <span>+12</span>
          </div>
        </section>

        <p id="status-message" class="status-message">
          Open a tab with a playing HTML5 video to begin.
        </p>

        <div class="actions">
          <button id="reset-button" type="button">Reset</button>
        </div>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
